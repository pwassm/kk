<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SeeAndLearn</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas  { display: block; }

/* Hamburger */
#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(30,30,30,0.82); border: none; border-radius: 10px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px; padding: 10px;
  touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }
#menuPanel {
  position: absolute; bottom: 54px; right: 0; z-index: 998;
  background: rgba(25,25,25,0.96); border-radius: 10px;
  overflow-y: auto; max-height: 80vh;
  display: none; flex-direction: column; min-width: 200px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#menuPanel::-webkit-scrollbar { width: 6px; }
#menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
#menuPanel.open { display: flex; }
#menuDateStamp {
  padding: 6px 12px 2px 12px; font: 10px Arial,sans-serif;
  color: rgba(255,255,255,0.35); text-align: right;
  flex-shrink: 0; user-select: none; letter-spacing: 0.3px;
}
.menu-item {
  padding: 13px 18px; color: #fff; font: 15px Arial,sans-serif;
  cursor: pointer; white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }
#settingsPanel { display: none; flex-direction: column; background: rgba(12,12,28,0.99); flex-shrink: 0; }
#settingsPanel.open { display: flex; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.setting-row span { color: #ccc; font: 14px Arial,sans-serif; }
.tog { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
.tog input { opacity: 0; width: 0; height: 0; }
.tog-slider { position: absolute; cursor: pointer; inset: 0; background: #444; border-radius: 22px; transition: .2s; }
.tog-slider:before { content:""; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.tog input:checked + .tog-slider { background: #2a8a2a; }
.tog input:checked + .tog-slider:before { transform: translateX(20px); }

/* Cell overlays — inside rotateWrap */
.cell-overlay {
  position: absolute; overflow: hidden; cursor: pointer;
  display: flex; align-items: flex-end; justify-content: center;
}
.cell-overlay img { position: absolute; inset: 0; width: 100%; height: 100%; }
.cell-overlay img.ei { object-fit: contain; background: rgba(0,0,0,0.15); }
.cell-overlay img.fc { object-fit: cover; }
.cell-label {
  position: relative; z-index: 1; width: 100%; text-align: center;
  padding: 2px 4px; font: bold 11px Arial,sans-serif; color: #fff;
  background: rgba(0,0,0,0.58); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cell-empty {
  position: absolute; cursor: crosshair;
  border: 2px dashed rgba(100,180,255,0);
  transition: border-color .15s, background .15s;
}
.cell-empty:hover { border-color: rgba(100,180,255,0.6); background: rgba(100,180,255,0.07); }

/* Fullscreen */
#fsWrap {
  display: none; position: fixed; inset: 0; z-index: 40000;
  background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
}
#fsWrap.open { display: flex; }
#fsWrap img { object-fit: contain; cursor: pointer; transition: transform 0.2s; }
#fsClose, #fsClose2 {
  position: absolute; width: 52px; height: 52px;
  background: rgba(255,255,255,0.22); border: none; border-radius: 50%;
  color: #fff; font-size: 30px; cursor: pointer;
}
#fsClose  { top: 16px; right: 16px; }
#fsClose2 { bottom: 16px; right: 16px; }

/* Quick-fill */
#qfModal {
  display: none; position: fixed; inset: 0; z-index: 20000;
  background: rgba(0,0,0,0.82); align-items: center; justify-content: center;
}
#qfModal.open { display: flex; }
#qfBox {
  background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
  padding: 18px 20px; min-width: 280px; max-width: 480px; width: 92vw;
  display: flex; flex-direction: column; gap: 10px;
  font-family: Arial,sans-serif; max-height: 94vh; overflow-y: auto;
}
#qfBox h3 { color: #8ef; font-size: 15px; }
#qfBox label { font-size: 12px; color: #aaa; display: block; margin-bottom: 3px; }
#qfBox input, #qfBox select {
  background: #0a0a1a; border: 1px solid #555; color: #fff;
  padding: 9px 10px; border-radius: 6px; font-size: 15px; width: 100%;
}
#qfBox input:focus, #qfBox select:focus { border-color: #8ef; outline: none; }
#qfLinkPrev { font-size: 11px; color: #888; word-break: break-all; min-height: 14px; }
#qfError { color: #f66; font-size: 12px; min-height: 14px; }
.qf-row { display: flex; gap: 8px; justify-content: flex-end; }
.qf-row button {
  padding: 9px 18px; border-radius: 6px; border: 1px solid #555;
  background: #2a2a3e; color: #fff; font-size: 14px; cursor: pointer;
}
.qf-row button.save { border-color: #5f5; color: #afa; }
.qf-row button:hover { background: #3a3a5e; }
#qfPasteBtn {
  width: 100%; padding: 11px; border-radius: 6px;
  border: 1px solid #4af; background: rgba(0,80,180,0.3);
  color: #8ef; font-size: 15px; cursor: pointer;
}
#qfPasteBtn:hover, #qfPasteBtn:active { background: rgba(0,80,180,0.5); }

/* JSON Editor */
#jsonModal {
  display: none; position: fixed; inset: 0; z-index: 25000;
  background: rgba(0,0,0,0.88); align-items: center; justify-content: center;
}
#jsonModal.open { display: flex; }
#jsonBox {
  background: #1a1a2e; border: none; border-radius: 0;
  padding: 10px; width: 100vw; height: 100vh; max-width: none;
  display: flex; flex-direction: column; font-family: sans-serif; box-sizing: border-box;
}
#jsonTitle { color: #8ef; font-size: 17px; padding-bottom: 10px; border-bottom: 1px solid #444; margin-bottom: 8px; }
#jsonText {
  flex: 1; background: #0a0a1a; border: 1px solid #444; color: #cfc;
  padding: 12px; font-size: 13px; line-height: 1.4; border-radius: 6px;
  resize: none; white-space: pre; overflow: auto;
}
#jsonText:focus { border-color: #8ef; outline: none; }
#jsonBtns { display: flex; gap: 10px; justify-content: flex-end; padding-top: 10px; }
#jsonBtns button {
  padding: 10px 18px; border-radius: 6px; border: 1px solid #555;
  background: #2a2a3e; color: #fff; font-size: 14px; cursor: pointer;
}
#jsonBtns button.save { border-color: #5f5; color: #afa; }
#jsonBtns button:hover { background: #3a3a5e; }
#jsonStatus { font-size: 12px; color: #888; min-height: 16px; padding-top: 4px; }

.github-token-setup {
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 11px 20px 14px 20px;
  background: #0d0d20;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.github-token-setup label { font: 12px Arial,sans-serif; color: #aaa; margin-bottom: 2px; }
.github-token-setup.open { display: flex; }
.token-input { background: #0a0a1a; border: 1px solid #555; color: #fff; padding: 9px 10px; border-radius: 6px; font-size: 14px; width: 100%; outline: none; }
.token-input:focus { border-color: #8ef; }
.token-status { font-size: 12px; color: #8ef; min-height: 14px; }
</style>
</head>
<body>

<div id="rotateWrap">
  <canvas id="gameCanvas"></canvas>
  <!-- cell overlays injected here by JS, rotate with canvas -->
</div>

<div id="menuWrap">
  <div id="menuPanel">
    <div id="menuDateStamp"></div>
    <div class="menu-item" id="miAdmin" style="opacity:0.45; color:#aaa; pointer-events:none; cursor:default; border-bottom:1px solid rgba(255,255,255,0.08);">&#128274; Admin</div>
    <div class="menu-item" id="miFastLinks">Links (Fast Paste)</div>
    <div class="menu-item" id="miTables">Tables (JSON editor)</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSaveJson">&#x1F4BE; Save JSON &nbsp;<small style="opacity:.5;font-size:11px">Ctrl+Alt+S</small></div>
    <div class="menu-item" id="miPushGithub">&#x2601; Push to GitHub</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSettings">Settings &#x25B8;</div>
    <div id="settingsPanel">
      <div class="setting-row">
        <span id="fitLabel">Img: Fill Cell</span>
        <label class="tog"><input type="checkbox" id="togFit"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>Cell labels</span>
        <label class="tog"><input type="checkbox" id="togCellLbl"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>cname label</span>
        <label class="tog"><input type="checkbox" id="togCname" checked><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>GitHub Sync</span>
        <label class="tog"><input type="checkbox" id="togGithub"><span class="tog-slider"></span></label>
      </div>
      <div class="github-token-setup" id="githubTokenSetup">
        <label for="tokenInput">GitHub Fine-Grained PAT (Contents:Write)</label>
        <input type="password" id="tokenInput" class="token-input" placeholder="github_pat_...">
        <div class="token-status" id="tokenStatus"></div>
      </div>
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miHelp">Help</div>
  </div>
  <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<div id="fsWrap">
  <img id="fsImg">
</div>

<div id="qfModal">
  <div id="qfBox">
    <h3 id="qfTitle">&#x1F4CC; Fill Cell</h3>
    <div class="qf-row">
      <button id="qfCancel">Cancel</button>
      <button class="save" id="qfSave">Save &nbsp;<small style="opacity:.5;font-size:11px">Ctrl+S</small></button>
    </div>
    <button id="qfPasteBtn">&#x1F4CB; Paste URL from clipboard</button>
    <div><label>Image link</label><input type="text" id="qfLink" inputmode="url" autocomplete="off"><div id="qfLinkPrev"></div></div>
    <div><label>Common name (cname)</label><input type="text" id="qfCname" autocomplete="off"></div>
    <div id="qfDesktop">
      <div><label>Scientific name</label><input type="text" id="qfSname" autocomplete="off"></div>
      <div><label>Attribution</label><input type="text" id="qfAttrib" placeholder="&#169; Author / CC BY 4.0" autocomplete="off"></div>
      <div><label>Comment</label><input type="text" id="qfComment" autocomplete="off"></div>
      <div><label>Asset</label>
        <select id="qfAsset"><option value="i">i &mdash; image</option><option value="v">v &mdash; video</option></select>
      </div>
      <div><label>Fit override</label>
        <select id="qfFit">
          <option value="">&mdash; default &mdash;</option>
          <option value="ei">ei &mdash; entire image</option>
          <option value="fc">fc &mdash; fill cell</option>
        </select>
      </div>
    </div>
    <div id="qfError"></div>
    <div class="qf-row">
      <button id="qfCancel2">Cancel</button>
      <button class="save" id="qfSave2">Save &nbsp;<small style="opacity:.5;font-size:11px">Ctrl+S</small></button>
    </div>
  </div>
</div>

<div id="fastLinkModal" style="display:none; position:fixed; inset:0; z-index:30000; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; flex-direction:column; gap:16px; font-family:sans-serif;">
  <h3 style="color:#8ef; margin:0;">Fast Link Paste</h3>
  <div style="color:#aaa; font-size:13px; margin-bottom:10px; text-align:center;">Auto-saves to unused cell.<br>Use button or paste directly into the box.</div>
  <button id="fastLinkPasteTop" style="padding:8px 16px; font-size:14px; border-radius:6px; border:1px solid #4af; background:#1a2a3a; color:#8ef; cursor:pointer;">&#128187; Paste from Clipboard</button>
  <input type="text" id="fastLinkInput" placeholder="Tap here & paste link..." autocomplete="off" style="width:80vw; max-width:400px; padding:15px; font-size:16px; border-radius:8px; border:1px solid #555; background:#111; color:#fff; outline:none;">
  <div style="color:#888; font-size:14px; min-height:20px; margin-top:5px;" id="fastLinkStatus">Ready.</div>
  <button id="fastLinkExit" style="padding:10px 30px; font-size:16px; border-radius:8px; border:1px solid #f66; background:#3a1a1a; color:#f66; cursor:pointer; margin-top:10px;">Exit (Esc)</button>
</div>
<div id="jsonModal">
  <div id="jsonBox">
    <div id="jsonTitle">&#x1F4CB; links.json Editor</div>
    <div id="tableEditorWrap" style="flex:1; display:flex; flex-direction:column; overflow:hidden; gap:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; gap:10px;">
          <button id="addTableItem" style="padding:8px 16px; border-radius:6px; border:1px solid #4af; background:rgba(0,80,180,0.3); color:#8ef; cursor:pointer;">+ Add Row</button>
          <button id="deleteSelectedRows" style="padding:8px 16px; border-radius:6px; border:1px solid #f66; background:rgba(180,0,0,0.3); color:#f88; cursor:pointer; display:none;">Delete Selected</button>
        </div>
        <button id="toggleRawJson" style="padding:8px 16px; border-radius:6px; border:1px solid #555; background:#2a2a3e; color:#fff; cursor:pointer;">Show Raw JSON</button>
      </div>
      <div id="tableEditor" style="flex:1; overflow:auto; background:#0a0a1a; border:1px solid #444; border-radius:6px;"></div>
      <textarea id="jsonText" style="display:none; flex:1; background:#0a0a1a; border:1px solid #444; color:#cfc; padding:12px; font-size:13px; font-family:monospace; line-height:1.4; border-radius:6px; resize:none; overflow:auto;"></textarea>
    </div>
    <div id="jsonBtns">
      <button id="jsonCancel">Exit table (Esc)</button>
      <button class="save" id="jsonApply">Apply</button>
      <button class="save" id="jsonPush" style="border-color:#4af; color:#8ef;">Push to GitHub</button>
      <button id="jsonDl">Download links.json</button>
    </div>
    <div id="jsonStatus"></div>
  </div>
</div>

<script src="core.js"></script>
<script src="table-editor.js"></script>

</body>
</html>
